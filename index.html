<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shane Stranahan</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ee;
      --surface: rgba(255, 255, 255, 0.78);
      --text: #1c1a17;
      --muted: #6c655d;
      --border: rgba(28, 26, 23, 0.08);
      --shadow: 0 20px 60px rgba(28, 26, 23, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.92), transparent 42%),
        linear-gradient(180deg, #f7f4ee 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: 48px 40px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    p {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Shane Stranahan</h1>
    <p>A quiet place on the web.</p>
  </main>
</body>
</html>
